name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint (biome + tsc)
        run: bun lint

      - name: Server tests
        run: bun test
        working-directory: apps/server
        env:
          TETHER_DB_PATH: /tmp/tether-ci.db

      - name: Mobile tests
        run: bun test
        working-directory: apps/mobile

      - name: Expo dependency compatibility
        # Advisory only: we intentionally pin expo to 57.0.7 (see root overrides
        # forcing expo-modules-core@57.0.6 → jsi@57.0.3, the version our iOS Swift
        # patch targets). Expo's "expected" 57.0.8 pulls jsi@57.0.4, which fails
        # to compile on Xcode 26.3. Never hard-fail the build on this drift.
        run: npx expo install --check || echo "::warning::expo install --check reported drift (expected — expo pinned to 57.0.7 for iOS build)"
        working-directory: apps/mobile
