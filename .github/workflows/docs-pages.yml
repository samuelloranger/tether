name: Publish docs to samlo.cloud

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "install.sh"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build docs
        env:
          GITHUB_ACTIONS: "true"   # config sets base=/tether/ under Actions
        run: bun run docs:build
      - name: Push built docs to samlo-cloud
        env:
          TOKEN: ${{ secrets.SAMLO_CLOUD_DOCS_TOKEN }}
        run: |
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/samuelloranger/samlo-cloud.git" out
          rm -rf out/docs/tether
          mkdir -p out/docs/tether
          cp -r docs/.vitepress/dist/. out/docs/tether/
          cd out
          git config user.name  "docs-bot"
          git config user.email "docs-bot@samlo.cloud"
          git add docs/tether
          git diff --cached --quiet || git commit -m "docs(tether): sync ${GITHUB_SHA::7}"
          git push
