name: Release builds

# Publishing a GitHub release (tag vX.Y.Z) builds and attaches every desktop,
# mobile, and server artifact, then syncs altstore.json on main. Manual runs are
# build-only: they upload workflow artifacts without modifying a release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      scope:
        description: Artifacts to build without publishing
        type: choice
        options:
          - desktop
          - all
        default: desktop

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: windows-latest
            args: ""
          # Native packages depend on the system webkit, so build them on the
          # older LTS for the widest glibc range (works on 24.04, Debian 12,
          # Fedora, etc.). They don't bundle an engine, so the runner's webkit
          # version is irrelevant here.
          - os: ubuntu-24.04
            args: --bundles deb,rpm
          # The AppImage bundles its OWN webkit (via linuxdeploy). The 24.04
          # engine (webkit2gtk 2.44) can't create an EGL display on some
          # GPU/compositor combos (e.g. hybrid Intel+NVIDIA on Wayland) and
          # renders a blank/gray window. 26.04 ships webkit2gtk 2.52, which
          # fixes it. Cost: a higher glibc floor — but that only affects the
          # AppImage; native-package users are unaffected.
          - os: ubuntu-26.04
            args: --bundles appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable branch @ 2026-07
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      # webkit/gtk to build; `rpm` so the .rpm bundle is produced (AppImage
      # tooling is fetched by tauri). The Linux build is split across two runners
      # (see the matrix): 24.04 emits .deb/.rpm, 26.04 emits the .AppImage with a
      # newer bundled webkit. Same deps on both.
      - name: Linux Tauri deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev rpm

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      # On release events, upload bundles to the release that triggered the run.
      # Manual runs omit the release inputs and upload build artifacts instead.
      # Signing is opt-in via repo secrets (safe in a public repo — Actions
      # secrets are encrypted and never exposed to fork PRs). When a secret is
      # absent the step still builds, just unsigned:
      #   - TAURI_SIGNING_PRIVATE_KEY(+ _PASSWORD): signs update artifacts and
      #     emits latest.json — REQUIRED for the in-app auto-updater to work.
      #   - APPLE_* : Developer ID signing + notarization (clears macOS Gatekeeper).
      #   - Windows signing needs a separate approach (Azure Trusted Signing or a
      #     pfx + certificateThumbprint in tauri.conf); left unsigned for now.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/mobile
          args: ${{ matrix.args }}
          tagName: ${{ github.event_name == 'release' && github.ref_name || '' }}
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}

      # tauri-action has no built-in workflow-artifact upload; on manual runs,
      # upload the built bundles so they can be downloaded and tested. The
      # bundle dir is target/release/bundle (no --target) or
      # target/<triple>/release/bundle (macOS builds pass --target).
      - name: Upload desktop bundles (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-${{ matrix.os }}-${{ strategy.job-index }}
          path: |
            apps/mobile/src-tauri/target/release/bundle/**
            apps/mobile/src-tauri/target/*/release/bundle/**
          if-no-files-found: error

  ios:
    if: github.event_name == 'release' || inputs.scope == 'all'
    runs-on: macos-15
    env:
      IPA_NAME: ${{ github.event_name == 'release' && 'tether.ipa' || 'tether-manual.ipa' }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      # Expo SDK 57 SPM deps need Swift 6.2+; the image default Xcode is older.
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest-stable

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Pin app version to the release tag
        if: github.event_name == 'release'
        working-directory: apps/mobile
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.expo.version = $v' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild iOS project
        working-directory: apps/mobile
        run: npx expo prebuild -p ios --clean
        env:
          CI: 'true'

      - name: Build unsigned archive
        working-directory: apps/mobile
        run: |
          xcodebuild -workspace ios/Tether.xcworkspace -scheme Tether \
            -configuration Release -sdk iphoneos \
            -archivePath build/Tether.xcarchive archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        working-directory: apps/mobile
        run: |
          mkdir -p Payload
          cp -R "build/Tether.xcarchive/Products/Applications/Tether.app" Payload/
          zip -qry "$IPA_NAME" Payload

      - name: Attach IPA to release
        if: github.event_name == 'release'
        working-directory: apps/mobile
        run: gh release upload "$GITHUB_REF_NAME" "$IPA_NAME" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload IPA workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tether-ios-${{ github.sha }}
          path: apps/mobile/${{ env.IPA_NAME }}

  android:
    if: github.event_name == 'release' || inputs.scope == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Pin app version to the release tag
        if: github.event_name == 'release'
        working-directory: apps/mobile
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.expo.version = $v' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild -p android --clean
        env:
          CI: 'true'

      # TODO(secrets): the release APK is currently signed with the PUBLIC React
      # Native template debug keystore — this provides NO authenticity and blocks
      # trusted in-place updates. It is a known gap, kept only because a real
      # signing key is not yet provisioned. To close it: add repo secrets
      # ANDROID_KEYSTORE_BASE64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS /
      # ANDROID_KEY_PASSWORD, decode the keystore into android/app before the
      # build, and point the release signingConfig at it (in app/build.gradle,
      # which `expo prebuild --clean` regenerates each run). Do NOT distribute
      # this APK as release-signed until then.
      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Attach APK to release
        if: github.event_name == 'release'
        run: |
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "tether.apk"
          gh release upload "$GITHUB_REF_NAME" "tether.apk" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload APK workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tether-android-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk

  server:
    if: github.event_name == 'release' || inputs.scope == 'all'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # x64 uses -baseline (no AVX2 requirement) so the single x64 asset runs
          # on older CPUs too; arm64 has no such split.
          - target: bun-linux-x64-baseline
            asset: tether-linux-x64
          - target: bun-linux-arm64
            asset: tether-linux-arm64
          - target: bun-darwin-arm64
            asset: tether-darwin-arm64
          - target: bun-darwin-x64-baseline
            asset: tether-darwin-x64
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      # The asset name embeds the tag. macOS ships a .tar.gz wrapping a stable
      # inner `tether`: a raw Mach-O can't survive a browser download — GitHub
      # release assets drop the exec bit and the browser stamps
      # com.apple.quarantine, so the adhoc-signed binary won't run. CLI
      # `tar xzf` restores the exec bit and does NOT propagate quarantine.
      # (Double-clicking the archive in Finder still quarantines; only Developer
      # ID notarization clears that.) Linux ships the raw binary (chmod +x is
      # enough there). install.sh and `tether update` mirror this branch.
      - name: Compile ${{ matrix.asset }}
        working-directory: apps/server
        run: |
          bun build --compile --minify \
            --target=${{ matrix.target }} \
            --define 'process.env.TETHER_VERSION="'"${GITHUB_REF_NAME}"'"' \
            --outfile tether \
            src/server/main.ts
          # Stable (un-versioned) name is the primary asset — it makes
          # github.com/.../releases/latest/download/<name> a one-click link.
          case "${{ matrix.asset }}" in
            *darwin*)
              stable="${{ matrix.asset }}.tar.gz"
              tar czf "$stable" tether ;;
            *)
              stable="${{ matrix.asset }}"
              mv tether "$stable" ;;
          esac
          # Transitional versioned copy: installs running an older `tether update`
          # still look for the version-stamped name, so keep it for one release
          # cycle to avoid breaking their self-update across this rename.
          versioned="${{ matrix.asset }}-${GITHUB_REF_NAME}"
          case "${{ matrix.asset }}" in *darwin*) versioned="${versioned}.tar.gz" ;; esac
          cp "$stable" "$versioned"
          echo "ASSET=$stable" >> "$GITHUB_ENV"
          echo "ASSET_VERSIONED=$versioned" >> "$GITHUB_ENV"
      - name: Checksum ${{ matrix.asset }}
        working-directory: apps/server
        run: |
          sha256sum "$ASSET" > "$ASSET.sha256"
          sha256sum "$ASSET_VERSIONED" > "$ASSET_VERSIONED.sha256"
      - name: Attach to release
        if: github.event_name == 'release'
        working-directory: apps/server
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "$ASSET" "$ASSET.sha256" \
            "$ASSET_VERSIONED" "$ASSET_VERSIONED.sha256" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload server workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}-${{ github.sha }}
          path: apps/server/${{ env.ASSET }}

  altstore:
    if: github.event_name == 'release'
    needs: ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: main # release event checks out the tag; the manifest lives on main

      - name: Sync altstore.json from the release
        run: scripts/altstore-release.sh "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit manifest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add altstore.json
          git diff --cached --quiet || git commit -m "altstore: $GITHUB_REF_NAME"
          git push
