name: release-builds

# Publish a GitHub release (tag vX.Y.Z) -> this builds the mobile apps on
# real Apple/Linux runners, attaches tether-vX.Y.Z.ipa/.apk to the release,
# and syncs altstore.json on main.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # Expo SDK 57 SPM deps need Swift 6.2+; the image default Xcode is older.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install workspace deps
        run: bun install

      - name: Pin app version to the release tag
        working-directory: apps/mobile
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.expo.version = $v' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild iOS project
        working-directory: apps/mobile
        run: npx expo prebuild -p ios --clean
        env:
          CI: 'true'

      - name: Build unsigned archive
        working-directory: apps/mobile
        run: |
          xcodebuild -workspace ios/Tether.xcworkspace -scheme Tether \
            -configuration Release -sdk iphoneos \
            -archivePath build/Tether.xcarchive archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        working-directory: apps/mobile
        run: |
          mkdir -p Payload
          cp -R "build/Tether.xcarchive/Products/Applications/Tether.app" Payload/
          zip -qry "tether-${GITHUB_REF_NAME}.ipa" Payload

      - name: Attach IPA to release
        working-directory: apps/mobile
        run: gh release upload "$GITHUB_REF_NAME" "tether-${GITHUB_REF_NAME}.ipa" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install workspace deps
        run: bun install

      - name: Pin app version to the release tag
        working-directory: apps/mobile
        run: |
          V="${GITHUB_REF_NAME#v}"
          jq --arg v "$V" '.expo.version = $v' app.json > app.json.tmp && mv app.json.tmp app.json

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild -p android --clean
        env:
          CI: 'true'

      # ponytail: release APK signed with the RN template debug keystore —
      # installable and consistent across CI runs. Move to a real keystore in
      # repo secrets if Play Store or stricter update integrity ever matters.
      - name: Build APK
        working-directory: apps/mobile/android
        run: ./gradlew --no-daemon assembleRelease

      - name: Attach APK to release
        run: |
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "tether-${GITHUB_REF_NAME}.apk"
          gh release upload "$GITHUB_REF_NAME" "tether-${GITHUB_REF_NAME}.apk" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  altstore:
    needs: ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # release event checks out the tag; the manifest lives on main

      - name: Sync altstore.json from the release
        run: scripts/altstore-release.sh "$GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit manifest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add altstore.json
          git diff --cached --quiet || git commit -m "altstore: $GITHUB_REF_NAME"
          git push
