name: Desktop builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: windows-latest
            args: ""
          # Native packages depend on the system webkit, so build them on the
          # older LTS for the widest glibc range (works on 24.04, Debian 12,
          # Fedora, etc.). They don't bundle an engine, so the runner's webkit
          # version is irrelevant here.
          - os: ubuntu-24.04
            args: --bundles deb,rpm
          # The AppImage bundles its OWN webkit (via linuxdeploy). The 24.04
          # engine (webkit2gtk 2.44) can't create an EGL display on some
          # GPU/compositor combos (e.g. hybrid Intel+NVIDIA on Wayland) and
          # renders a blank/gray window. 26.04 ships webkit2gtk 2.52, which
          # fixes it. Cost: a higher glibc floor — but that only affects the
          # AppImage; native-package users are unaffected.
          - os: ubuntu-26.04
            args: --bundles appimage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # webkit/gtk to build; `rpm` so the .rpm bundle is produced (AppImage
      # tooling is fetched by tauri). The Linux build is split across two runners
      # (see the matrix): 24.04 emits .deb/.rpm, 26.04 emits the .AppImage with a
      # newer bundled webkit. Same deps on both.
      - name: Linux Tauri deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev rpm

      - name: Install workspace deps
        run: bun install

      # Builds the web frontend (beforeBuildCommand) then the native bundle, and
      # uploads the artifacts to the release that triggered the run.
      #
      # Signing is opt-in via repo secrets (safe in a public repo — Actions
      # secrets are encrypted and never exposed to fork PRs). When a secret is
      # absent the step still builds, just unsigned:
      #   - TAURI_SIGNING_PRIVATE_KEY(+ _PASSWORD): signs update artifacts and
      #     emits latest.json — REQUIRED for the in-app auto-updater to work.
      #   - APPLE_* : Developer ID signing + notarization (clears macOS Gatekeeper).
      #   - Windows signing needs a separate approach (Azure Trusted Signing or a
      #     pfx + certificateThumbprint in tauri.conf); left unsigned for now.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/mobile
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseId: ${{ github.event.release.id }}
