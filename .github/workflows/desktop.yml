name: Desktop builds

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: windows-latest
            args: ""
          - os: ubuntu-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # webkit/gtk to build; `rpm` so the .rpm bundle is produced (AppImage
      # tooling is fetched by tauri). With bundle.targets "all" this one Ubuntu
      # runner emits .deb (Ubuntu/Mint), .rpm (Fedora), and .AppImage (Arch + any
      # glibc distro) — i.e. every Linux.
      - name: Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libssl-dev rpm

      - name: Install workspace deps
        run: bun install

      # Builds the web frontend (beforeBuildCommand) then the native bundle, and
      # uploads the artifacts to the release that triggered the run.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/mobile
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseId: ${{ github.event.release.id }}
